<div class="p-4">
    <!-- Header Section -->
    <app-page-header 
        title="Employee Management"
        subtitle="Track, manage, and monitor employee information"
        [showAddButton]="true"
        addButtonLabel="Add New Employee"
        buttonClass="p-button-success text-sm"
        (addButtonClick)="onAddEmployee()">
    </app-page-header>

    <div class="px-4 py-6">
        <!-- Metrics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <!-- Employee Distribution -->
            <app-metrics-card
                [title]="employeeDistribution.title"
                [subtitle]="employeeDistribution.subtitle"
                [iconClass]="employeeDistribution.iconClass"
                [iconBgClass]="employeeDistribution.iconBgClass"
                [metrics]="employeeDistribution.metrics">
            </app-metrics-card>

            <!-- Department Strength -->
            <app-metrics-card
                [title]="departmentMetrics.title"
                [subtitle]="departmentMetrics.subtitle"
                [iconClass]="departmentMetrics.iconClass"
                [iconBgClass]="departmentMetrics.iconBgClass"
                [metrics]="departmentMetrics.metrics">
            </app-metrics-card>
        </div>

        <!-- Employee Data Table -->
        <app-data-table
            [columns]="tableColumns"
            [data]="employees"
            [loading]="loading"
            [globalFilterFields]="globalFilterFields"
            [filters]="tableFilters"
            searchPlaceholder="Search employees..."
            [selectedItems]="selectedEmployees"
            (selectionChange)="selectedEmployees = $event"
            [rowActions]="rowActions"
            [bulkActions]="bulkActions"
            (filterChange)="onFilterChange($event)"
            (rowActionClick)="onRowAction($event)"
            (bulkActionClick)="onBulkAction($event)">
        </app-data-table>
    </div>

    <p-confirmDialog [style]="{width: '450px'}" 
                    styleClass="rounded-xl shadow-xl"
                    [closeOnEscape]="true"
                    acceptButtonStyleClass="p-button-danger"
                    rejectButtonStyleClass="p-button-text">
    </p-confirmDialog>

    <p-toast></p-toast>
</div>
