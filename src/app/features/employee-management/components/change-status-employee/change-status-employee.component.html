<div class="flex items-center justify-center gap-3 py-3">
  <span
    class="px-3 py-1.5 rounded-md text-sm font-semibold"
    [ngClass]="currentStatus() === 'ACTIVE' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
  >
    {{ currentStatusLabel() }}
  </span>
  <i class="pi pi-arrow-right text-gray-500 text-lg"></i>
  <span
    class="px-3 py-1.5 rounded-md text-sm font-semibold"
    [ngClass]="newStatus() === 'ACTIVE' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
  >
    {{ newStatusLabel() }}
  </span>
</div>
