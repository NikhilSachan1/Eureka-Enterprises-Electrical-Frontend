<div class="flex items-center justify-center gap-3 py-3">
  <span
    class="px-3 py-1.5 rounded-md text-sm font-semibold"
    [ngClass]="
      currentStatus() === ALL_EMPLOYMENT_TYPES.ACTIVE ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
    "
  >
    {{ getStatusLabel(currentStatus()) }}
  </span>
  <i [class]="`${ICONS.COMMON.ARROW_RIGHT} text-gray-500 text-lg`"></i>
  <span
    class="px-3 py-1.5 rounded-md text-sm font-semibold"
    [ngClass]="newStatus() === ALL_EMPLOYMENT_TYPES.ACTIVE ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
  >
    {{ getStatusLabel(newStatus()) }}
  </span>
</div>
