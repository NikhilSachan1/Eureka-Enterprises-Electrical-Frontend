<div style="padding: 50px;">
    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">
        <app-input-field [formGroup]="formGroup" [inputFieldConfig]="ADD_EMPLOYEE_INPUT_FIELDS_CONFIG['fname']"></app-input-field>

        <app-input-field [formGroup]="formGroup" [inputFieldConfig]="ADD_EMPLOYEE_INPUT_FIELDS_CONFIG['aadharNumber']"></app-input-field>

        <app-input-field [formGroup]="formGroup" [inputFieldConfig]="ADD_EMPLOYEE_INPUT_FIELDS_CONFIG['role']"></app-input-field>

        <app-input-field [formGroup]="formGroup" [inputFieldConfig]="ADD_EMPLOYEE_INPUT_FIELDS_CONFIG['workOn']"></app-input-field>

        <app-input-field [formGroup]="formGroup" [inputFieldConfig]="ADD_EMPLOYEE_INPUT_FIELDS_CONFIG['dob']"></app-input-field>

        <div style="margin-bottom: 10px;">
            <label for="on_label">Checkbox Input</label>
            <div class="flex flex-col gap-4">
                @for (category of categories; track category.key) {
                    <div class="flex items-center">
                        <p-checkbox [formControlName]="'checkboxInput'" [inputId]="'checkbox-' + category.key" [name]="'checkboxInput'" [value]="category" [binary]="false" [indeterminate]="true" size="large"
                            [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('checkboxInput')}"/>
                        <label [for]="'checkbox-' + category.key" class="ml-2"> {{ category.name }} </label>
                    </div>
                }
            </div>
            <small class="p-error" *ngIf="isFieldInvalid('checkboxInput')">{{ getErrorMessage('checkboxInput') }}</small>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="on_label">Radio Button Input</label>
            <div class="flex flex-col gap-4">
                @for (category of categories; track category.key) {
                    <div class="flex items-center">
                        <p-radioButton [formControlName]="'radioInput'" [inputId]="'radio-' + category.key" [name]="'radioInput'" [value]="category" size="large"
                            [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('radioInput')}"/>
                        <label [for]="'radio-' + category.key" class="ml-2">{{ category.name }}</label>
                    </div>
                }
            </div>
            <small class="p-error" *ngIf="isFieldInvalid('radioInput')">{{ getErrorMessage('radioInput') }}</small>
        </div>

        <div style="margin-bottom: 10px;">
            <p-fileupload name="demo[]" 
                [customUpload]="true"
                (uploadHandler)="onUpload($event)" 
                [multiple]="false" 
                accept="image/*" 
                maxFileSize="1000000" 
                mode="advanced"
                [auto]="true"
                chooseLabel="Choose Image"
                cancelLabel="Cancel"
                [showUploadButton]="false"
                [showCancelButton]="false"
                [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('fileInput')}">
            </p-fileupload>
            <small class="p-error" *ngIf="isFieldInvalid('fileInput')">{{ getErrorMessage('fileInput') }}</small>
        </div> -->

        <div class="flex gap-2 mt-4">
            <button pButton type="submit" 
                label="Submit" 
                [loading]="isSubmitting"
                [disabled]="isSubmitting || isFormPristine()"
                class="p-button-primary">
            </button>
            <button pButton type="button" 
                label="Reset" 
                (click)="resetForm()"
                [disabled]="isSubmitting"
                class="p-button-secondary">
            </button>
        </div>
    </form>
</div>
