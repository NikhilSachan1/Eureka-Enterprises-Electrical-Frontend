<app-auth-layout
  [title]="'Reset Password'"
  [subtitle]="'Enter your new password'"
  [submitButtonLabel]="'Reset Password'"
  [footerText]="'Remember your password?'"
  [footerLinkText]="'Back to Login'"
  [footerLinkAction]="onBackToLogin"
  [onSubmit]="onSubmit">
  
  <ng-template #formContent>
    <!-- New Password field -->
    <app-input-field 
      [formGroup]="formGroup" 
      [inputFieldConfig]="fieldConfigs()['password']">
    </app-input-field>

    <!-- Confirm Password field -->
    <app-input-field 
      [formGroup]="formGroup" 
      [inputFieldConfig]="fieldConfigs()['confirmPassword']">
    </app-input-field>

    <!-- Submit button -->
    <button pButton 
      type="submit" 
      label="Reset Password" 
      [loading]="loading()"
      [disabled]="loading()"
      class="auth-submit-button">
    </button>
  </ng-template>
</app-auth-layout>

<!-- Toast notifications -->
<p-toast></p-toast>
