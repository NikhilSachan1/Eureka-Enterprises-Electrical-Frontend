<app-auth-layout 
	title="Sign in"
	subtitle="to Eureka Enterprises"
	footerText="Don't have an account?"
	footerLinkText="Contact Administrator"
	(footerLinkAction)="onContactAdmin()"
>

	<form 
		(ngSubmit)="onSubmit()"
		[formGroup]="form.formGroup"
		class="form auth-form"
	>
		<!-- Email field -->
		<app-input-field 
			[formGroup]="form.formGroup" 
			[inputFieldConfig]="form.fieldConfigs['email']"
		></app-input-field>


		<!-- Password field -->
		<app-input-field 
			[formGroup]="form.formGroup"
			[inputFieldConfig]="form.fieldConfigs['password']"
		></app-input-field>


		<!-- Remember me and forgot password -->
		<div class="flex items-center justify-between mb-6 gap-4">
			<div class="flex-shrink-0">
				<app-input-field 
					[formGroup]="form.formGroup"
					[inputFieldConfig]="form.fieldConfigs['rememberMe']"
				></app-input-field>
			</div>

			<div class="flex-shrink-0">
				<p-button
					(click)="onForgotPassword()"
					[link]="true"
					[label]="'Forgot password?'"
					[size]="'small'"
				></p-button>
			</div>
		</div>


		<!-- Sign in button -->
		<p-button 
			[loading]="isSubmitting()"
			label="Sign in"
			size="large"
			type="submit"
			[style]="{'width': '100%'}"
		></p-button>
	</form>
</app-auth-layout>

<!-- Toast notifications -->
<p-toast></p-toast>
