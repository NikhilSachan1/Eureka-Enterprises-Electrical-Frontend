<app-auth-layout
  title="Forgot Password"
  subtitle="Enter your email to reset your password"
  footerText="Remember your password?"
  footerLinkText="Back to Login"
  (footerLinkAction)="onBackToLogin()"
>

  <form 
    (ngSubmit)="onSubmit()" 
    class="form auth-form"
  >
    <!-- Email field -->
    <app-input-field 
      [formGroup]="formGroup" 
      [inputFieldConfig]="fieldConfigs()['email']"
    ></app-input-field> 

    <!-- Submit button -->
    <p-button 
      [loading]="loading()"
      [disabled]="loading()"
      label="Send Reset Link" 
      size="large"
			type="submit"
      [style]="{'width': '100%'}"
    ></p-button>
  </form>

</app-auth-layout>

<!-- Toast notifications -->
<p-toast></p-toast>
