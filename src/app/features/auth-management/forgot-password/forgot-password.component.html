<app-auth-layout
  [title]="'Forgot Password'"
  [subtitle]="'Enter your email to reset your password'"
  [submitButtonLabel]="'Send Reset Link'"
  [footerText]="'Remember your password?'"
  [footerLinkText]="'Back to Login'"
  [footerLinkAction]="onBackToLogin"
  [onSubmit]="onSubmit">
  
  <ng-template #formContent>
    <!-- Email field -->
    <app-input-field 
      [formGroup]="formGroup" 
      [inputFieldConfig]="fieldConfigs()['email']">
    </app-input-field>

    <!-- Submit button -->
    <button pButton 
      type="submit" 
      label="Send Reset Link" 
      [loading]="loading()"
      [disabled]="loading()"
      class="auth-submit-button">
    </button>
  </ng-template>
</app-auth-layout>

<!-- Toast notifications -->
<p-toast></p-toast>
