<form
  [formGroup]="form.formGroup"
  class="form"
>
  @if (dialogActionType() === EButtonActionTypeEnum.HANDOVER_INITIATE) {
    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.allocatedToEmployeeName"
    />
  }

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.assetImages"
  />

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.remark"
  />
</form>
