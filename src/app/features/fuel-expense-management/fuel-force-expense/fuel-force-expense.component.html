<app-page-header 
    title="Force Fuel Expense"
    subtitle="Add fuel expense record for employees"
></app-page-header>

<form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="form">
            
    <app-input-field 
        [formGroup]="formGroup" 
        [inputFieldConfig]="fieldConfigs()['employeeNames']">
    </app-input-field>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['selectVehicle']">
        </app-input-field>

        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['fuelType']">
        </app-input-field>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['fuelFilledDate']">
        </app-input-field>

        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['fuelFilledInKms']">
        </app-input-field>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['fuelQuantityInLtr']">
        </app-input-field>

        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['fuelFilledAmount']">
        </app-input-field>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['paymentMode']">
        </app-input-field>
    </div>

    <!-- Proof Fields Section -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['vehicleMeterReadingProof']">
        </app-input-field>

        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['pumpMeterReadingProof']">
        </app-input-field>
    </div>

    <app-input-field 
        [formGroup]="formGroup" 
        [inputFieldConfig]="fieldConfigs()['fuelFilledReceiptProof']">
    </app-input-field>

    <app-input-field 
        [formGroup]="formGroup" 
        [inputFieldConfig]="fieldConfigs()['comment']">
    </app-input-field>

    <div class="pt-4 border-t border-gray-200 button-container">
        <button pButton 
            type="submit" 
            label="Add Force Fuel Expense" 
            [loading]="loading()"
            [disabled]="loading()"
            class="p-button-primary flex-1 md:flex-none">
        </button>
        
        <button pButton 
            type="button" 
            label="Reset" 
            (click)="resetForm()"
            [disabled]="loading()"
            class="p-button-outlined flex-1 md:flex-none">
        </button>
    </div>
    
</form>
