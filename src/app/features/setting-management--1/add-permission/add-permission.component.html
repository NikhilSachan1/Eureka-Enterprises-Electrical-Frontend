<app-page-header 
  title="Add New Permission"
  subtitle="Create a new permission for the system"
  [showAddButton]="false"
></app-page-header>

<div class="content-wrapper">
  <div class="form-container">
    <p-card>
      <ng-template pTemplate="header">
        <div class="card-header">
          <h3 class="card-title">Permission Details</h3>
          <p class="card-subtitle">Enter the permission information below</p>
        </div>
      </ng-template>

      <form [formGroup]="permissionForm" (ngSubmit)="onSubmit()" class="permission-form">
        <!-- Permission Name -->
        <div class="form-group">
          <p-floatlabel>
            <input 
              pInputText 
              id="name"
              formControlName="name"
              [class.ng-invalid]="isFieldInvalid('name')"
              [class.ng-dirty]="isFieldInvalid('name')"
              fluid
            />
            <label for="name">Permission Name</label>
          </p-floatlabel>
          
          @if (isFieldInvalid('name')) {
            <small class="error-message">
              {{ getFieldError('name') }}
            </small>
          }
        </div>

        <!-- Module Selection -->
        <div class="form-group">
          <p-floatlabel>
            <p-select
              id="module"
              formControlName="module"
              [options]="moduleOptions()"
              [class.ng-invalid]="isFieldInvalid('module')"
              [class.ng-dirty]="isFieldInvalid('module')"
              [fluid]="true"
              [filter]="true"
              filterBy="label"
              placeholder="Select a module"
            ></p-select>
            <label for="module">Module</label>
          </p-floatlabel>
          
          @if (isFieldInvalid('module')) {
            <small class="error-message">
              {{ getFieldError('module') }}
            </small>
          }
        </div>

        <!-- Description -->
        <div class="form-group">
          <p-floatlabel>
            <textarea 
              pTextarea
              id="description"
              formControlName="description"
              [class.ng-invalid]="isFieldInvalid('description')"
              [class.ng-dirty]="isFieldInvalid('description')"
              rows="4"
              [autoResize]="true"
              fluid
            ></textarea>
            <label for="description">Description</label>
          </p-floatlabel>
          
          @if (isFieldInvalid('description')) {
            <small class="error-message">
              {{ getFieldError('description') }}
            </small>
          }
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
          <p-button
            type="submit"
            label="Create Permission"
            [icon]="icons.ACTIONS.CHECK"
            severity="success"
            [loading]="saving()"
            [disabled]="permissionForm.invalid"
          ></p-button>
          
          <p-button
            type="button"
            label="Cancel"
            [icon]="icons.ACTIONS.TIMES"
            severity="secondary"
            [outlined]="true"
            (onClick)="onCancel()"
          ></p-button>
        </div>
      </form>
    </p-card>
  </div>
</div>

<p-toast></p-toast>
