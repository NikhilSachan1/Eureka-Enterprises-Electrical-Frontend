<app-page-header 
    title="Add Petro Card"
    subtitle="Register a new petro card to the system"
></app-page-header>

<form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="form">
            
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['cardName']">
        </app-input-field>

        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['cardNumber']">
        </app-input-field>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['expiryDate']">
        </app-input-field>

        <app-input-field 
            [formGroup]="formGroup" 
            [inputFieldConfig]="fieldConfigs()['holderName']">
        </app-input-field>
    </div>

    <div class="pt-4 border-t border-gray-200 button-container">
        <button
            type="submit"
            pButton
            label="Add Petro Card"
            icon="pi pi-plus"
            class="p-button-primary"
            [loading]="loading()"
            [disabled]="loading()">
        </button>

        <button
            type="button"
            pButton
            label="Reset"
            icon="pi pi-refresh"
            class="p-button-secondary"
            (click)="resetForm()"
            [disabled]="loading()">
        </button>
        
    </div>
</form>
