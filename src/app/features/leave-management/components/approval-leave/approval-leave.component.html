<form
  [formGroup]="form.formGroup"
  class="form"
>
  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs['comment']"
  />

  @if (dialogActionType() === EButtonActionTypeEnum.REJECT && form.fieldConfigs['attendanceStatus']) {
    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs['attendanceStatus']"
    />
  }
</form>
