<app-page-header 
    title="Force Leave"
    subtitle="Submit a force leave request for employees"
></app-page-header>

<form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="form">
            
    <app-input-field 
        [formGroup]="formGroup" 
        [inputFieldConfig]="fieldConfigs()['employeeNames']">
    </app-input-field>

    <app-input-field 
        [formGroup]="formGroup" 
        [inputFieldConfig]="fieldConfigs()['dateRange']">
    </app-input-field>

    <app-input-field 
        [formGroup]="formGroup" 
        [inputFieldConfig]="fieldConfigs()['comment']">
    </app-input-field>

    <div class="pt-4 border-t border-gray-200 button-container">
        <button pButton 
            type="submit" 
            label="Submit Force Leave Request" 
            [loading]="loading()"
            [disabled]="loading()"
            class="p-button-primary flex-1 md:flex-none">
        </button>
        
        <button pButton 
            type="button" 
            label="Reset" 
            (click)="resetForm()"
            [disabled]="loading()"
            class="p-button-outlined flex-1 md:flex-none">
        </button>
    </div>
    
</form>
