<app-page-header 
    title="Apply Attendance"
    subtitle="Check in or check out from your assigned location"
></app-page-header>

<div class="min-h-screen px-4 sm:px-6 py-6 sm:py-8">
  <div class="max-w-sm sm:max-w-md mx-auto space-y-4">

    <!-- Main Content Card -->
    <div class="rounded-2xl sm:rounded-2xl border border-surface-100 shadow-lg px-4 sm:px-6 py-5 sm:py-6">
      
      <!-- Status & Hours Section -->
      <div class="text-center mb-6 sm:mb-8">
        
        <!-- Status Badge -->
        <div class="mb-4 sm:mb-6">
          <div class="inline-flex items-center px-5 sm:px-6 py-2.5 sm:py-3 rounded-full border border-surface-200">
            <div class="w-2.5 sm:w-3 h-2.5 sm:h-3 bg-green-500 rounded-full mr-2.5 sm:mr-3"></div>
            <span class="text-sm sm:text-base font-bold">Checked In</span>
          </div>
        </div>
        
        <!-- Hours Display -->
        <div class="mb-6 sm:mb-8">
          <div class="rounded-xl sm:rounded-2xl p-7 sm:p-10 border border-surface-200">
            <div class="text-4xl sm:text-6xl font-black font-mono mb-2 sm:mb-3 tracking-tight" style="color: var(--primary-color)">
              7:45
            </div>
            <div class="text-xs sm:text-sm font-bold uppercase tracking-[0.2em] opacity-70" style="color: var(--primary-dark-color)">
              Hours Today
            </div>
          </div>
        </div>
        
        <!-- Date & Time Pills -->
        <div class="flex flex-col sm:flex-row gap-2 sm:gap-3">
          <div class="flex-1 rounded-xl sm:rounded-2xl p-4 sm:p-5 border border-surface-200">
            <div class="flex items-center justify-center">
              <div class="w-6 sm:w-8 h-6 sm:h-8 rounded-md sm:rounded-lg flex items-center justify-center mr-2.5 sm:mr-3" style="background: var(--primary-color)">
                <i class="pi pi-calendar text-white text-xs sm:text-sm"></i>
              </div>
              <div class="text-left">
                <div class="text-xs sm:text-sm font-bold">Dec 24, 2024</div>
                <div class="text-xs">Today</div>
              </div>
            </div>
          </div>
          
          <div class="flex-1 rounded-xl sm:rounded-2xl p-4 sm:p-5 border border-surface-200">
            <div class="flex items-center justify-center">
              <div class="w-6 sm:w-8 h-6 sm:h-8 rounded-md sm:rounded-lg flex items-center justify-center mr-2.5 sm:mr-3" style="background: var(--primary-color)">
                <i class="pi pi-clock text-white text-xs sm:text-sm"></i>
              </div>
              <div class="text-left">
                <div class="text-xs sm:text-sm font-bold">2:30 PM</div>
                <div class="text-xs">Live</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Divider -->
      <div class="relative my-5 sm:my-7">
        <div class="w-full border-t border-surface-200"></div>
        <div class="absolute inset-0 flex items-center justify-center">
          <span class="px-3 sm:px-4 bg-white text-xs sm:text-sm text-gray-500 font-medium">Assignment Details</span>
        </div>
      </div>

      <!-- Assignment Section - Regular Employee -->
      <div class="space-y-3 sm:space-y-4">
        <!-- Site -->
        <div class="flex items-center p-3.5 sm:p-4 rounded-lg sm:rounded-xl border border-surface-200">
          <div class="w-5 sm:w-6 h-5 sm:h-6 bg-blue-500 rounded-sm sm:rounded-md flex items-center justify-center mr-3 sm:mr-4 flex-shrink-0">
            <i class="pi pi-map-marker text-white text-xs"></i>
          </div>
          <div class="min-w-0 flex-1">
            <span class="text-xs text-gray-500 font-medium">Site</span>
            <div class="font-semibold text-gray-800 text-sm sm:text-base truncate">Downtown Office Building</div>
          </div>
        </div>
        
        <!-- Client -->
        <div class="flex items-center p-3.5 sm:p-4 rounded-lg sm:rounded-xl border border-surface-200">
          <div class="w-5 sm:w-6 h-5 sm:h-6 rounded-sm sm:rounded-md flex items-center justify-center mr-3 sm:mr-4 flex-shrink-0" style="background: var(--primary-color)">
            <i class="pi pi-briefcase text-white text-xs"></i>
          </div>
          <div class="min-w-0 flex-1">
            <span class="text-xs text-gray-500 font-medium">Client</span>
            <div class="font-semibold text-sm sm:text-base truncate" style="color: var(--primary-color)">Tech Solutions Inc.</div>
          </div>
        </div>
      </div>

      <!-- Driver Assignment Section (Alternative - commented out)
      <div class="space-y-3 sm:space-y-4">
        <div class="flex items-center p-3.5 sm:p-4 rounded-lg sm:rounded-xl border border-surface-200">
          <div class="w-5 sm:w-6 h-5 sm:h-6 bg-purple-500 rounded-sm sm:rounded-md flex items-center justify-center mr-3 sm:mr-4 flex-shrink-0">
            <i class="pi pi-car text-white text-xs"></i>
          </div>
          <div class="min-w-0 flex-1">
            <span class="text-xs text-gray-500 font-medium">Vehicle</span>
            <div class="font-semibold text-gray-800 text-sm sm:text-base truncate">Service Van #205</div>
          </div>
        </div>
        
        <div class="flex items-center p-3.5 sm:p-4 rounded-lg sm:rounded-xl border border-surface-200">
          <div class="w-5 sm:w-6 h-5 sm:h-6 bg-emerald-500 rounded-sm sm:rounded-md flex items-center justify-center mr-3 sm:mr-4 flex-shrink-0">
            <i class="pi pi-route text-white text-xs"></i>
          </div>
          <div class="min-w-0 flex-1">
            <span class="text-xs text-gray-500 font-medium">Route</span>
            <div class="font-semibold text-emerald-600 text-sm sm:text-base truncate">Route A - Central District</div>
          </div>
        </div>
      </div>
      -->
    </div>

    <!-- Action Button - Check Out (since user is checked in) -->
    <p-button 
      label="Check Out" 
      icon="pi pi-sign-out" 
      severity="warn"
      size="large"
      styleClass="w-full h-12 sm:h-14 text-base sm:text-lg font-semibold bg-gradient-to-r from-orange-500 to-red-600 border-0 rounded-lg sm:rounded-xl">
    </p-button>
    
  </div>
</div>

<p-toast></p-toast>
