<app-page-header
  [pageHeaderConfig]="pageHeaderConfig()"
  (headerButtonClick)="onHeaderButtonClick($event)"
/>

<div class="metrics-card-wrapper">
  <app-metrics-card [metricCardConfig]="metricsCards()" />
</div>

<div class="search-filter-wrapper">
  <app-search-filter
    [tableRef]="dataTable.dt()"
    [searchFilterConfig]="searchFilterConfig"
  />
</div>

<ng-template
  #attendanceAssignmentDetails
  let-row
>
  <!-- Clean Layout for Assignment Details - No truncation since table is scrollable -->
  <div class="flex flex-col gap-1.5 text-sm whitespace-nowrap">
    <!-- Row 1: Location + Client -->
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-1.5">
        <span class="text-slate-400">Location:</span>
        <span class="text-slate-700">{{ row.siteLocation }}</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="text-slate-400">Client:</span>
        <span class="text-slate-700">{{ row.clientName }}</span>
      </div>
    </div>

    <!-- Row 2: Engineer + Vehicle -->
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-1.5">
        <span class="text-slate-400">Engineer:</span>
        <span class="text-slate-700">{{ row.associateEngineerName }}</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="text-slate-400">Vehicle:</span>
        <span class="text-slate-700">{{ row.associatedVehicle }}</span>
      </div>
    </div>
  </div>
</ng-template>

<app-data-table
  #dataTable
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  [customBodyTemplates]="{ attendanceAssignmentDetails: attendanceAssignmentDetails }"
  (rowActionClick)="handleAttendanceTableActionClick($any($event), false)"
  (bulkActionClick)="handleAttendanceTableActionClick($any($event), true)"
  (filterData)="onTableStateChange($event)"
/>
