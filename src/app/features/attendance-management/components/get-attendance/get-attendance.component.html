<app-page-header
  [pageHeaderConfig]="pageHeaderConfig()"
  (headerButtonClick)="onHeaderButtonClick($event)"
/>

<app-metrics-card [metricGroups]="metricGroups()" />

<div class="search-filter-wrapper">
  <app-search-filter
    [tableRef]="dataTable.dt()"
    [searchFilterConfig]="searchFilterConfig"
  />
</div>

<ng-template
  #attendanceAssignmentDetails
  let-row
>
  <div class="attendance-assignment-details">
    <div class="attendance-assignment-details__cell">
      <span
        class="attendance-assignment-details__icon-wrap"
        aria-hidden="true"
      >
        <i [class]="ALL_ICONS.COMMON.MAP_MARKER"></i>
      </span>
      <div class="attendance-assignment-details__text">
        <span class="attendance-assignment-details__label">Location</span>
        <span class="attendance-assignment-details__value">{{ row.siteLocation || '—' }}</span>
      </div>
    </div>

    <div class="attendance-assignment-details__cell">
      <span
        class="attendance-assignment-details__icon-wrap"
        aria-hidden="true"
      >
        <i [class]="ALL_ICONS.SITE.BUILDING"></i>
      </span>
      <div class="attendance-assignment-details__text">
        <span class="attendance-assignment-details__label">Client</span>
        <span class="attendance-assignment-details__value">{{ row.clientName || '—' }}</span>
      </div>
    </div>

    <div class="attendance-assignment-details__cell">
      <span
        class="attendance-assignment-details__icon-wrap"
        aria-hidden="true"
      >
        <i [class]="ALL_ICONS.COMMON.USER"></i>
      </span>
      <div class="attendance-assignment-details__text">
        <span class="attendance-assignment-details__label">Engineer</span>
        <span class="attendance-assignment-details__value">{{ row.associateEngineerName || '—' }}</span>
      </div>
    </div>

    <div class="attendance-assignment-details__cell">
      <span
        class="attendance-assignment-details__icon-wrap"
        aria-hidden="true"
      >
        <i [class]="ALL_ICONS.COMMON.CAR"></i>
      </span>
      <div class="attendance-assignment-details__text">
        <span class="attendance-assignment-details__label">Vehicle</span>
        <span class="attendance-assignment-details__value">{{ row.associatedVehicle || '—' }}</span>
      </div>
    </div>
  </div>
</ng-template>

<app-data-table
  #dataTable
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  [customBodyTemplates]="{ attendanceAssignmentDetails: attendanceAssignmentDetails }"
  (rowActionClick)="handleAttendanceTableActionClick($any($event), false)"
  (bulkActionClick)="handleAttendanceTableActionClick($any($event), true)"
  (filterData)="onTableStateChange($event)"
/>
