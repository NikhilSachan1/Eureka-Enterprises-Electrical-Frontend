<app-page-header [pageHeaderConfig]="pageHeaderConfig()" />

<div class="search-filter-wrapper">
  <app-search-filter
    [tableRef]="dataTable.dt()"
    [searchFilterConfig]="searchFilterConfig"
  />
</div>

<ng-template
  #paymentSheetAmounts
  let-row
>
  <app-payment-sheet-amounts-cell
    leftLabel="Payable"
    [leftAmount]="row.totalCurrentAmount"
    leftVariant="payable"
    rightLabel="Paid"
    [rightAmount]="row.totalPaidAmount"
    rightVariant="paid"
    footerLabel="Pending"
    [footerAmount]="getPendingAmount(row)"
    settledLabel="Fully paid"
    [isSettled]="isFullyPaid(row)"
  />
</ng-template>

<app-data-table
  #dataTable
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  [customBodyTemplates]="{
    paymentSheetAmounts: paymentSheetAmounts,
  }"
  (filterData)="onTableStateChange($event)"
  (rowActionClick)="handlePaymentSheetTableActionClick($any($event))"
/>
