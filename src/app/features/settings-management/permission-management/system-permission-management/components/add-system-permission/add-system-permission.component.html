<app-page-header 
    title="Add New Permission"
    subtitle="Create a new system permission"
></app-page-header>

<form 
    (ngSubmit)="onSubmit()"
    [formGroup]="form.formGroup"
    class="form"
>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-input-field 
            [formGroup]="form.formGroup" 
            [inputFieldConfig]="form.fieldConfigs['moduleName']"
            (onFieldChange)="onModuleNameChange()"
        ></app-input-field>

        <app-input-field 
            [formGroup]="form.formGroup" 
            [inputFieldConfig]="form.fieldConfigs['action']"
        ></app-input-field>
    </div>

    <app-input-field 
        [formGroup]="form.formGroup" 
        [inputFieldConfig]="form.fieldConfigs['comment']"
    ></app-input-field>

    <div class="pt-4 border-t border-gray-200 button-container">
        <app-button 
            [buttonConfig]="form.buttonConfigs['cancel']"
            (onButtonClick)="onReset()"
        ></app-button>
        
        <app-button 
            [buttonConfig]="form.buttonConfigs['submit']"
            [showButtonLoader]="isSubmitting()"
        ></app-button>
    </div>

</form>

<!-- Toast notifications -->
<p-toast></p-toast>
