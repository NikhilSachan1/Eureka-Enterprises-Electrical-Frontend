<app-page-header 
    title="Add New Role"
    subtitle="Create a new user role with permissions"
></app-page-header>

<form  
    (ngSubmit)="onSubmit()"
    [formGroup]="form.formGroup"
    class="form"
>

    <app-input-field 
            [formGroup]="form.formGroup" 
            [inputFieldConfig]="form.fieldConfigs['roleName']">
    </app-input-field>

    <app-input-field 
        [formGroup]="form.formGroup" 
        [inputFieldConfig]="form.fieldConfigs['description']">
    </app-input-field>

    <div class="pt-4 border-t border-gray-200 button-container">
        <app-button 
            [buttonConfig]="form.buttonConfigs['cancel']"
            (onButtonClick)="onReset()"
        ></app-button>
                
        <app-button 
            [buttonConfig]="form.buttonConfigs['submit']"
            [showButtonLoader]="isSubmitting()"
        ></app-button>
    </div>

</form>

<!-- Toast notifications -->
<p-toast></p-toast>
