<app-page-header 
    title="Permission Management"
    subtitle="Manage permissions, roles, and user access"
    [showAddButton]="shouldShowAddButton()"
    [addButtonLabel]="getAddButtonLabel()"
    (addButtonClick)="onAddButtonClick()"
></app-page-header>

<div class="content-wrapper">
    <div class="metrics-grid">
        @for (metric of metricsCards(); track metric.title) {
            <app-metrics-card
                [title]="metric.title"
                [subtitle]="metric.subtitle"
                [iconClass]="metric.iconClass"
                [iconBgClass]="metric.iconBgClass"
                [metrics]="metric.metrics"
            ></app-metrics-card>
        }
    </div>

    <!-- <p-card
        styleClass="card-container"
    > -->
        <app-nav-tabs 
            [tabs]="tabs()" 
            [activeTabIndex]="0"
            [showRouterOutlet]="true"
        ></app-nav-tabs>
    <!-- </p-card> -->
</div>
