<app-page-header 
    [pageHeaderConfig]="pageHeaderConfig()"
    (headerButtonClick)="onAddButtonClick()"
></app-page-header>

<div class="content-wrapper">
    <div class="metrics-grid">
        @for (metric of metricsCards(); track metric.title) {
            <app-metrics-card
                [title]="metric.title"
                [subtitle]="metric.subtitle"
                [iconClass]="metric.iconClass"
                [iconBgClass]="metric.iconBgClass"
                [metrics]="metric.metrics"
            ></app-metrics-card>
        }
    </div>

    <app-nav-tabs 
        [tabs]="tabs()" 
        [showRouterOutlet]="true"
    ></app-nav-tabs>
</div>
