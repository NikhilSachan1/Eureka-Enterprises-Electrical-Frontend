<app-page-header 
    [pageHeaderConfig]="pageHeaderConfig()"
    (headerButtonClick)="onAddButtonClick()"
></app-page-header>

<div class="content-wrapper">
    <div class="metrics-grid">
        @for (metric of metricsCards(); track metric.title) {
            <app-metrics-card
                [metricCardConfig]="metric"
            ></app-metrics-card>
        }
    </div>

    <app-nav-tabs 
        [tabs]="tabs()" 
        [showRouterOutlet]="true"
    ></app-nav-tabs>
</div>
