<app-page-header [pageHeaderConfig]="pageHeaderConfig()" />

@if (isPageReady()) {
  <app-set-permission
    [roleColumns]="userColumns()"
    [roleDefaultPermissions]="userDefaultPermissions()"
    [isUserPermissionMode]="true"
    [isSubmitting]="isSubmitting()"
    (matrixModuleSave)="onMatrixModuleSave($event)"
  />
}
