<app-page-header
  [pageHeaderConfig]="pageHeaderConfig()"
  (headerButtonClick)="onAddButtonClick()"
/>

<div class="content-wrapper">
  <div class="metrics-grid">
    @for (metric of metricsCards(); track metric.title) {
      <app-metrics-card [metricCardConfig]="metric" />
    }
  </div>

  <app-nav-tabs
    [tabs]="tabs()"
    [tabMode]="tabModeType"
  />
</div>
