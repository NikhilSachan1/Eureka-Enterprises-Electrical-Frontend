<ng-template
  #permissionCountRole
  let-row
>
  <div class="flex flex-col gap-1.5 text-sm whitespace-nowrap">
    <div class="flex items-center gap-1.5">
      <span class="text-content-secondary">Assigned:</span>
      <span class="text-content">{{ row.rolePermissionCount.current }}</span>
    </div>
    <div class="flex items-center gap-1.5">
      <span class="text-content-secondary">Total:</span>
      <span class="text-content">{{ row.rolePermissionCount.total }}</span>
    </div>
  </div>
</ng-template>

<div class="search-filter-wrapper">
  <app-search-filter
    [tableRef]="dataTable.dt()"
    [searchFilterConfig]="searchFilterConfig"
  />
</div>

<app-data-table
  #dataTable
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  [customBodyTemplates]="{ permissionCountRole: permissionCountRole }"
  (rowActionClick)="handleRoleTableActionClick($any($event), false)"
  (bulkActionClick)="handleRoleTableActionClick($any($event), true)"
  (filterData)="onTableStateChange($event)"
/>
