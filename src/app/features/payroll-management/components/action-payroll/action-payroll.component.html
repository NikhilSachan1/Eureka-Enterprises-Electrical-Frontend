@if (dialogActionType() !== EButtonActionTypeEnum.PAID && dialogActionType() !== EButtonActionTypeEnum.APPROVE) {
  <form
    [formGroup]="form.formGroup"
    class="form"
  >
    @if (form.fieldConfigs.comment) {
      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.comment"
      />
    }
  </form>
}
