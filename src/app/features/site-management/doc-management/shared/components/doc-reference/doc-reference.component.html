@let nodes = flatNodes();
@if (!nodes.length) {
  <span class="doc-ref__empty">—</span>
} @else {
  <div
    class="doc-ref__chain"
    role="group"
    aria-label="Document reference chain"
  >
    @for (node of nodes; track node.kind; let last = $last) {
      <span class="doc-ref__item">
        <span
          class="doc-ref__badge"
          [attr.data-tone]="tone(node.kind)"
        >
          {{ label(node) }}
        </span>
        <span class="doc-ref__val">{{ node.value }}</span>
      </span>
      @if (!last) {
        <span
          class="doc-ref__sep"
          aria-hidden="true"
        >
          ›
        </span>
      }
    }
  </div>
}
