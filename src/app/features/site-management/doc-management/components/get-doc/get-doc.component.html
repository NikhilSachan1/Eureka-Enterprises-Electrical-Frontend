<div class="mb-3 flex justify-end">
  <p-splitbutton
    [label]="addDocumentButtonLabel() ?? undefined"
    [model]="addDocumentSplitItems"
    (onClick)="onAddDocumentPrimaryClick()"
  />
</div>

<app-data-table
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  (rowActionClick)="handleDocTableActionClick($any($event))"
/>
