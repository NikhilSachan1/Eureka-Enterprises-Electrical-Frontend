<form
  [formGroup]="form.formGroup"
  class="form"
>
  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.jmcNumber"
  />
  <app-doc-ref-chain
    [refDocId]="selectedRefDocId()"
    [docContext]="docContext()"
  />

  @if (poBillingSummary(); as summary) {
    <div class="mt-1 flex divide-x divide-slate-200 rounded-md border border-slate-200 bg-slate-50 text-[11px]">
      <div class="flex flex-1 items-center gap-1.5 px-3 py-1.5">
        <span class="text-slate-400">PO Value</span>
        <span class="font-semibold text-slate-700">{{ summary.poTotal | currency: 'INR' : 'symbol' : '1.0-0' }}</span>
      </div>
      <div class="flex flex-1 items-center gap-1.5 px-3 py-1.5">
        <span class="text-slate-400">Billed</span>
        <span class="font-semibold text-orange-500">
          {{ summary.alreadyInvoiced | currency: 'INR' : 'symbol' : '1.0-0' }}
        </span>
      </div>
      <div class="flex flex-1 items-center gap-1.5 px-3 py-1.5">
        <span class="text-slate-400">Balance</span>
        <span
          class="font-semibold"
          [class.text-emerald-600]="summary.remaining > 0"
          [class.text-red-500]="summary.remaining <= 0"
        >
          {{ summary.remaining | currency: 'INR' : 'symbol' : '1.0-0' }}
        </span>
      </div>
    </div>
  }

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.invoiceNumber"
  />

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.invoiceDate"
  />

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.invoiceTaxableAmount"
  />

  <div>
    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.invoiceGstAmount"
    />
    <div class="mt-1 flex items-center gap-1.5 text-[11px] text-slate-500">
      <span>Auto-calc:</span>
      <input
        type="number"
        min="0"
        max="100"
        step="0.5"
        [value]="gstPercent() ?? ''"
        (input)="updateGstPercent(+$any($event.target).value || null)"
        class="w-14 rounded border border-slate-300 bg-white px-2 py-0.5 text-xs focus:border-primary focus:outline-none"
        placeholder="0"
      />
      <span>% of taxable</span>
    </div>
  </div>

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.invoiceTotalAmount"
  />

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.invoiceAttachments"
  />

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.invoiceRemark"
  />
</form>
