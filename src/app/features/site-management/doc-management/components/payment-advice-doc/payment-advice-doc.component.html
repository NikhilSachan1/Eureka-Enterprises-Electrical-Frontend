<form
  [formGroup]="form.formGroup"
  class="form"
>
  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.transactionNumber"
  />
  <app-doc-ref-chain
    [refDocId]="selectedRefDocId()"
    [docContext]="docContext()"
  />

  @if (form.fieldConfigs.paymentAdviceNumber && docContext() !== 'purchase') {
    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.paymentAdviceNumber"
    />
  }

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.paymentAdviceDate"
  />

  @if (form.fieldConfigs.paymentAdviceAttachments && docContext() !== 'purchase') {
    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.paymentAdviceAttachments"
    />
  }

  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.paymentAdviceRemark"
  />
</form>
