<ng-template
  #paidFromAccountDetails
  let-entry
>
  <app-bank-details-cell
    [bankDetails]="$any(entry.value)"
    [displayMode]="EBankDetailsDisplayMode.COMPACT"
  />
</ng-template>

<ng-template
  #docWorkspaceContextDetail
  let-entry
>
  <app-doc-workspace-context [view]="$any(entry.value)" />
</ng-template>

<ng-template
  #documentReferenceHierarchy
  let-entry
>
  <app-doc-reference [root]="$any(entry.value)" />
</ng-template>

<app-view-detail
  [drawerDetails]="_details()"
  [customTemplates]="{
    docWorkspaceContextDetail: docWorkspaceContextDetail,
    documentReferenceHierarchy: documentReferenceHierarchy,
    paidFromAccountDetails: paidFromAccountDetails,
  }"
/>
