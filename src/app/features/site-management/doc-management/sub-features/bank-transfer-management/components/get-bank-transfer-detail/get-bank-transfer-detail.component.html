<ng-template
  #docWorkspaceContextDetail
  let-entry
>
  <app-doc-workspace-context [view]="$any(entry.value)" />
</ng-template>

<ng-template
  #documentReferenceHierarchy
  let-entry
>
  <app-doc-reference [root]="$any(entry.value)" />
</ng-template>

<ng-template
  #bankTransferDetailAmounts
  let-entry
>
  @let v = $any(entry.value);
  <app-doc-amount [segments]="docBankTransferDrawerAmountSegments(v)" />
</ng-template>

<app-view-detail
  [drawerDetails]="_details()"
  [customTemplates]="{
    docWorkspaceContextDetail: docWorkspaceContextDetail,
    documentReferenceHierarchy: documentReferenceHierarchy,
    bankTransferDetailAmounts: bankTransferDetailAmounts,
  }"
/>
