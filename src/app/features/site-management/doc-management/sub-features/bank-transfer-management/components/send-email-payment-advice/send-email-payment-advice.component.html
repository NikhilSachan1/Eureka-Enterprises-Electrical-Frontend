@if (form) {
  <form
    [formGroup]="form.formGroup"
    class="form"
  >
    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.to"
    />

    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.cc"
    />

    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.subject"
    />

    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.body"
    />

    @if (pdfFileName(); as fileName) {
      <div class="flex flex-col gap-1">
        <span class="text-sm font-medium text-color-secondary">Attachment</span>
        <div
          tabindex="0"
          class="flex items-center gap-2 rounded-lg border border-border-medium px-3 py-2 bg-surface-50 cursor-pointer hover:bg-surface-100 transition-colors"
          (click)="openPdfPreview()"
          title="Click to preview"
        >
          <i class="pi pi-file-pdf text-red-500 text-base"></i>
          <span class="text-sm text-color flex-1 truncate">{{ fileName }}</span>
          <i class="pi pi-eye text-muted-color text-xs"></i>
        </div>
      </div>
    }
  </form>
}
