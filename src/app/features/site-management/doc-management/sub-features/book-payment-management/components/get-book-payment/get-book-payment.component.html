<ng-template
  #docWorkspaceContext
  let-row
>
  <app-doc-workspace-context [view]="row.docWorkspaceContext" />
</ng-template>

<ng-template
  #bookPaymentDocumentReference
  let-row
>
  <app-doc-reference [root]="row.documentReferenceHierarchy" />
</ng-template>

<ng-template
  #bookPaymentAmountBreakdown
  let-row
>
  <app-doc-amount [segments]="docBookPaymentAmountSegments(row)" />
</ng-template>

<app-page-header
  [pageHeaderConfig]="pageHeaderConfig()"
  (headerButtonClick)="onHeaderButtonClick($event)"
/>

<app-data-table
  #dataTable
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  [customBodyTemplates]="{
    docWorkspaceContext: docWorkspaceContext,
    bookPaymentDocumentReference: bookPaymentDocumentReference,
    bookPaymentAmountBreakdown: bookPaymentAmountBreakdown,
  }"
  (rowActionClick)="handleBookPaymentTableActionClick($any($event))"
  (filterData)="onTableStateChange($event)"
/>
