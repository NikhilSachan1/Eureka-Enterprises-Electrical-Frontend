<ng-template
  #poAmountBreakdown
  let-row
>
  <app-doc-amount [segments]="docPoTaxGstSegments(row)" />
</ng-template>

<ng-template
  #poInvoicePaymentSummary
  let-row
>
  <app-doc-amount [segments]="docPoInvoicePaymentSegments(row)" />
</ng-template>

<ng-template
  #poLockStatus
  let-row
>
  <app-unlock-request
    [isLocked]="row.isLocked"
    [requestedAt]="row.unlockRequestedAt"
    [requestedByUser]="row.unlockRequestedByUser"
    [reason]="row.unlockReason"
  />
</ng-template>

<app-page-header
  [pageHeaderConfig]="pageHeaderConfig()"
  (headerButtonClick)="onHeaderButtonClick($event)"
/>

<app-data-table
  #dataTable
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  [customBodyTemplates]="{
    poAmountBreakdown: poAmountBreakdown,
    poInvoicePaymentSummary: poInvoicePaymentSummary,
    poLockStatus: poLockStatus,
  }"
  (rowActionClick)="handlePoTableActionClick($any($event))"
  (filterData)="onTableStateChange($event)"
/>
