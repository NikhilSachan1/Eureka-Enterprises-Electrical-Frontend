<ng-template
  #docWorkspaceContextDetail
  let-entry
>
  <app-doc-workspace-context [view]="$any(entry.value)" />
</ng-template>

<ng-template
  #documentReferenceHierarchy
  let-entry
>
  <app-doc-reference [root]="$any(entry.value)" />
</ng-template>

<ng-template
  #jmcLineItems
  let-entry
>
  @let items = $any(entry.value);
  <section class="jmc-line-items">
    <div class="jmc-line-items__table">
      <div class="jmc-line-items__row jmc-line-items__row--header">
        <span>#</span>
        <span>Item name</span>
        <span>Unit</span>
        <span>Quantity</span>
      </div>

      @for (item of items; track $index; let i = $index) {
        <div class="jmc-line-items__row">
          <span class="jmc-line-items__index">{{ i + 1 }}</span>
          <span class="jmc-line-items__value">{{ item.itemName }}</span>
          <span class="jmc-line-items__value">{{ item.unit }}</span>
          <span class="jmc-line-items__value">{{ item.quantity }}</span>
        </div>
      }
    </div>
  </section>
</ng-template>

<app-view-detail
  [drawerDetails]="_jmcDetails()"
  [customTemplates]="{
    docWorkspaceContextDetail: docWorkspaceContextDetail,
    documentReferenceHierarchy: documentReferenceHierarchy,
    jmcLineItems: jmcLineItems,
  }"
/>
