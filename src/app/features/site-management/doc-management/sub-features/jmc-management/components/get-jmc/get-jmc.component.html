<ng-template
  #jmcLockStatus
  let-row
>
  <app-unlock-request
    [isLocked]="row.isLocked"
    [requestedAt]="row.unlockRequestedAt"
    [requestedByUser]="row.unlockRequestedByUser"
    [reason]="row.unlockReason"
  />
</ng-template>

<ng-template
  #documentReferenceChain
  let-row
>
  <app-doc-reference [segments]="documentReferenceSegmentsFromJmc(row)" />
</ng-template>

<app-page-header
  [pageHeaderConfig]="pageHeaderConfig()"
  (headerButtonClick)="onHeaderButtonClick($event)"
/>

<app-data-table
  #dataTable
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  [customBodyTemplates]="{
    jmcLockStatus: jmcLockStatus,
    documentReferenceChain: documentReferenceChain,
  }"
  (rowActionClick)="handleJmcTableActionClick($any($event))"
  (filterData)="onTableStateChange($event)"
/>
