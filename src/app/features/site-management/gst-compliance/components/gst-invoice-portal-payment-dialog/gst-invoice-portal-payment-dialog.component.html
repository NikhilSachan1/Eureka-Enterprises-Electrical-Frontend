<div class="gst-portal-pay-dialog max-h-[70vh] overflow-y-auto pr-1">
  <div class="mb-4 rounded-lg border border-slate-200 bg-slate-50/80 px-3 py-2 text-xs text-slate-700">
    <div class="font-semibold text-slate-900">{{ monthLabel() }}</div>
    <div class="mt-0.5 text-slate-600">
      Party:
      <span class="font-medium text-slate-800">{{ partyName() }}</span>
      · Invoice
      <span class="font-mono text-slate-800">{{ billNo() }}</span>
    </div>
    <div class="mt-1">
      GST on bill:
      <strong>{{ gstAmount() | currency: 'INR' : 'symbol' : '1.2-2' }}</strong>
    </div>
  </div>

  <form
    class="space-y-4"
    [formGroup]="verifyForm"
  >
    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold uppercase tracking-wide text-gray-500">
        Verification date
        <span class="text-red-500">*</span>
      </label>
      <input
        type="date"
        formControlName="verifiedDate"
        class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm outline-none transition-colors focus:ring-2 focus:ring-primary/30"
        [class.border-red-400]="isInvalid()"
      />
      @if (isInvalid()) {
        <span class="text-xs text-red-500">Choose the date you are verifying against</span>
      }
    </div>
    <p class="text-[11px] leading-relaxed text-slate-500">
      Status will show
      <strong>Verified</strong>
      with this date, or
      <strong>Pending</strong>
      until you verify.
    </p>
  </form>
</div>
