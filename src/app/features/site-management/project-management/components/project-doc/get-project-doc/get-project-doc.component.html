<div class="documents-container">
  @for (doc of documents; track doc.id) {
    <div class="document-card">
      <!-- Left: Icon -->
      <div
        class="document-icon"
        [style.background-color]="`${getDocumentColor(doc.type)}15`"
      >
        <i
          [class]="getDocumentIcon(doc.type)"
          [style.color]="getDocumentColor(doc.type)"
        ></i>
      </div>

      <!-- Middle: Document Info -->
      <div class="document-info">
        <div class="document-header">
          <h3 class="document-number">{{ doc.documentNumber }}</h3>
          <span
            class="document-type"
            [style.background-color]="`${getDocumentColor(doc.type)}20`"
            [style.color]="getDocumentColor(doc.type)"
          >
            {{ doc.type }}
          </span>
        </div>
        <p class="document-name">{{ doc.documentName }}</p>
        <div class="document-meta">
          <span class="document-date">
            <i [class]="icons.COMMON.CALENDAR"></i>
            {{ doc.date }}
          </span>
        </div>
      </div>

      <!-- Right: Amount & Actions -->
      <div class="document-actions">
        <div class="document-amount">
          <span class="amount-label">Amount</span>
          <span class="amount-value">{{ formatCurrency(doc.amount) }}</span>
          <span class="gst-amount">GST: {{ formatCurrency(doc.gst) }}</span>
        </div>
        <div class="action-buttons">
          <button
            class="action-btn view-btn"
            (click)="onViewDocument(doc)"
            type="button"
          >
            <i [class]="icons.ACTIONS.EYE"></i>
          </button>
          <button
            class="action-btn edit-btn"
            (click)="onEditDocument(doc)"
            type="button"
          >
            <i [class]="icons.ACTIONS.PENCIL"></i>
          </button>
          <button
            class="action-btn download-btn"
            (click)="onDownloadDocument(doc)"
            type="button"
          >
            <i [class]="icons.COMMON.DOWNLOAD"></i>
          </button>
          <button
            class="action-btn delete-btn"
            (click)="onDeleteDocument(doc)"
            type="button"
          >
            <i [class]="icons.ACTIONS.TRASH"></i>
          </button>
        </div>
      </div>
    </div>
  }
</div>
