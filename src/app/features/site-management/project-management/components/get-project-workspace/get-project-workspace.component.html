<app-page-header [pageHeaderConfig]="pageHeaderConfig()" />

<div class="search-filter-wrapper">
  @for (tab of [activeFilterTab()]; track tab) {
    <app-search-filter
      [searchFilterConfig]="searchFilterConfig()"
      [prefillValues]="searchFilterPrefill()"
      (formReady)="onSearchFilterReady($event)"
      (onFilterSubmit)="onWorkspaceFilterSubmit($event)"
      (onFilterReset)="onWorkspaceFilterReset()"
    />
  }
</div>

@if (showOverviewPanel()) {
  <section
    class="workspace-overview-panel"
    [class.workspace-overview-panel--with-timeline]="showTimeline()"
  >
    <div class="workspace-overview-panel__body">
      <div class="workspace-overview-panel__detail">
        <app-project-workspace-info-card />
      </div>

      @if (showTimeline()) {
        <div
          class="workspace-overview-panel__divider"
          aria-hidden="true"
        ></div>
        <div class="workspace-overview-panel__timeline">
          <app-get-project-timeline />
        </div>
      }
    </div>
  </section>
}

<div class="project-workspace-main min-w-0 max-w-full">
  @if (visibleWorkspaceTabs().length) {
    <app-nav-tabs
      class="block min-w-0 max-w-full"
      [tabs]="visibleWorkspaceTabs()"
      [tabMode]="tabModeType"
    />
  }
</div>
