<app-page-header
  [pageHeaderConfig]="pageHeaderConfig()"
  (headerButtonClick)="onHeaderButtonClick($event)"
>
  <div
    headerFilter
    class="dsr-header-employee-filter"
  >
    @if (showEmployeeFilter()) {
      <app-input-field
        [inputFieldConfig]="employeeFilterFieldConfig()"
        [fieldValue]="selectedEmployeeNames()"
        (onFieldChange)="onEmployeeFilterChange($event)"
      />
    }
  </div>
</app-page-header>

<ng-template
  #docWorkspaceContext
  let-row
>
  <app-doc-workspace-context [view]="row.docWorkspaceContext" />
</ng-template>

<ng-template
  #projectWorkTypes
  let-row
>
  @let labels = $any(row).workTypes;
  <div
    class="project-work-types-chips flex flex-wrap gap-1 max-w-[16rem] min-w-0"
    title="Kinds of work covered on this DSR (from site work types)"
  >
    @if (labels.length === 0) {
      <span class="text-content-secondary text-sm font-medium">—</span>
    } @else {
      @for (label of labels; track $index) {
        <app-chip [label]="label" />
      }
    }
  </div>
</ng-template>

<app-data-table
  #dataTable
  [tableConfig]="table.tableConfig()"
  [tableHeader]="table.headers()"
  [tableData]="table.data()"
  [loading]="table.loading()"
  [bulkActionButtons]="table.bulkActions()"
  [rowActions]="table.rowActions()"
  [customBodyTemplates]="{
    docWorkspaceContext: docWorkspaceContext,
    projectWorkTypes: projectWorkTypes,
  }"
  (rowActionClick)="handleDsrTableActionClick($any($event), false)"
  (filterData)="onTableStateChange($event)"
/>
