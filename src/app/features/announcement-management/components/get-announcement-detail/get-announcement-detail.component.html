<ng-template
  #announcementTargets
  let-entry
>
  @let targets = $any(entry.value) ?? [];
  @if (targets.length > 0) {
    <div class="targets-grid">
      @for (target of targets; track target.targetId) {
        <div class="targets-grid__item">
          <img
            [src]="getAvatarUrl(target.employeeName)"
            [alt]="target.employeeName"
            class="targets-grid__avatar"
            loading="lazy"
          />
          <div class="targets-grid__content">
            <span class="targets-grid__name">{{ target.employeeName }}</span>
            <span class="targets-grid__id">{{ target.employeeId }}</span>
          </div>
        </div>
      }
    </div>
  } @else {
    <span class="targets-empty">—</span>
  }
</ng-template>

<ng-template
  #announcementMessage
  let-entry
>
  <app-announcement-content-preview [message]="entry.value ?? ''" />
</ng-template>

<app-view-detail
  [drawerDetails]="_announcementDetails()"
  [customTemplates]="{
    announcementTargets: announcementTargets,
    announcementMessage: announcementMessage,
  }"
/>
