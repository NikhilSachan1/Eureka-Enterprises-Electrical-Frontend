<ng-template
  #announcementTargets
  let-entry
>
  @let ids = $any(entry.value) ?? [];
  @if (ids.length > 0) {
    <div class="flex flex-wrap gap-2">
      @for (id of ids; track id) {
        <app-status-tag
          [value]="id"
          [config]="{ severity: 'secondary' }"
        />
      }
    </div>
  } @else {
    <span>-</span>
  }
</ng-template>

<ng-template
  #announcementMessage
  let-entry
>
  <app-announcement-content-preview [message]="entry.value ?? ''" />
</ng-template>

<app-view-detail
  [drawerDetails]="_announcementDetails()"
  [customTemplates]="{
    announcementTargets: announcementTargets,
    announcementMessage: announcementMessage,
  }"
/>
