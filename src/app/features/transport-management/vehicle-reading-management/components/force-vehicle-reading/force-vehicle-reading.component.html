<app-page-header [pageHeaderConfig]="pageHeaderConfig()" />

<form
  (ngSubmit)="onSubmit()"
  [formGroup]="form.formGroup"
  class="form"
>
  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.employeeName"
  />

  <app-linked-vehicle-petro-card
    class="block mb-8"
    [employeeName]="selectedEmployeeName()"
    [prefillFromAppConfiguration]="false"
    [showCard]="false"
    (linkedUserVehicleDetailChange)="linkedUserVehicleDetail.set($event)"
  />

  @if (showRemainingForceVehicleReadingFields()) {
    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.readingDate"
    />

    <div class="grid grid-cols-1 md:grid-cols-3">
      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.startTime"
      />

      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.startLocation"
      />

      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.startOdometerReading"
      />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3">
      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.endTime"
      />

      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.endLocation"
      />

      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.endOdometerReading"
      />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2">
      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.startOdometerReadingAttachments"
      />

      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.endOdometerReadingAttachments"
      />
    </div>

    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.remarks"
    />

    <div class="button-container">
      <app-button
        [buttonConfig]="form.buttonConfigs['reset']"
        (onButtonClick)="onReset()"
      />

      <app-button
        [buttonConfig]="form.buttonConfigs['submit']"
        [showButtonLoader]="isSubmitting()"
      />
    </div>
  }
</form>
