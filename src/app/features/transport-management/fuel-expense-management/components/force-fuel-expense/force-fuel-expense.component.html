<app-page-header [pageHeaderConfig]="pageHeaderConfig()" />

<form
  (ngSubmit)="onSubmit()"
  [formGroup]="form.formGroup"
  class="form"
>
  <app-input-field
    [formGroup]="form.formGroup"
    [inputFieldConfig]="form.fieldConfigs.employeeName"
  />

  <app-linked-vehicle-petro-card
    [employeeName]="selectedEmployeeName()"
    [prefillFromAppConfiguration]="false"
    (linkedUserVehicleDetailChange)="linkedUserVehicleDetail.set($event)"
  />

  @if (showRemainingForceFuelFields()) {
    <div class="grid grid-cols-1 md:grid-cols-4">
      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.fuelFillDate"
      />

      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.paymentMode"
      />

      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.fuelAmount"
      />

      @if (form.fieldConfigs.transactionId) {
        <app-input-field
          [formGroup]="form.formGroup"
          [inputFieldConfig]="form.fieldConfigs.transactionId"
        />
      }
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2">
      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.fuelLiters"
      />

      <app-input-field
        [formGroup]="form.formGroup"
        [inputFieldConfig]="form.fieldConfigs.odometerReading"
      />
    </div>

    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.remark"
    />

    <app-input-field
      [formGroup]="form.formGroup"
      [inputFieldConfig]="form.fieldConfigs.fuelExpenseAttachments"
    />

    <div class="button-container">
      <app-button
        [buttonConfig]="form.buttonConfigs['reset']"
        (onButtonClick)="onReset()"
      />

      <app-button
        [buttonConfig]="form.buttonConfigs['submit']"
        [showButtonLoader]="isSubmitting()"
      />
    </div>
  }
</form>
