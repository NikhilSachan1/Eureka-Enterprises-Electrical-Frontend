<div class="flex justify-between items-center mb-6 pb-4">
  <div>
    <h1 class="text-3xl font-bold text-gray-800">{{ finalPageHeaderConfig().title }}</h1>
    <p class="text-gray-600">{{ finalPageHeaderConfig().subtitle }}</p>
  </div>
  @if (finalPageHeaderConfig().showHeaderButton) {
    @if (finalPageHeaderConfig().headerButtonConfig) {
      <app-button
        [buttonConfig]="finalPageHeaderConfig().headerButtonConfig"
        (onButtonClick)="headerButtonClick.emit()"
      ></app-button>
    }
  }
</div>
