<!-- Only show if user has multiple roles -->
@if (hasMultipleRoles()) {
  @if (isSidebarCollapsed()) {
    <!-- Collapsed Sidebar - Only Icon (clickable) -->
    <button
      type="button"
      class="role-btn-compact"
      [disabled]="isSubmitting()"
      (click)="togglePopover($event)"
      [attr.aria-label]="'Switch Role: ' + activeRole().name"
    >
      <div class="role-icon-compact">
        <i [class]="ALL_ICONS.COMMON.ID_CARD"></i>
      </div>
    </button>
  } @else {
    <!-- Expanded Sidebar - Full Role Switcher Button -->
    <button
      type="button"
      class="role-btn"
      [disabled]="isSubmitting()"
      (click)="togglePopover($event)"
    >
      <div class="role-icon">
        <i [class]="ALL_ICONS.COMMON.ID_CARD"></i>
      </div>
      <div class="role-info">
        <span class="role-label">Current Role</span>
        <span class="role-name">{{ activeRole().name }}</span>
      </div>
      <i
        class="pi pi-sync switch-icon"
        [class.spinning]="isSubmitting()"
      ></i>
    </button>
  }

  <!-- Role Selection Popover -->
  <p-popover
    #rolePopover
    [dismissable]="true"
    [appendTo]="'body'"
  >
    <div class="role-menu">
      <!-- Header -->
      <div class="role-menu-header">
        <i class="pi pi-users"></i>
        <span>Switch Role</span>
      </div>

      <!-- Role Cards -->
      <div class="role-list">
        @for (role of roles(); track role.id) {
          @let isActive = role.id === activeRole().id;
          <button
            type="button"
            class="role-card"
            [class.selected]="isActive"
            [disabled]="isSubmitting()"
            (click)="selectRole(role)"
          >
            <!-- Role Icon -->
            <div class="role-card-icon">
              <i [class]="ALL_ICONS.COMMON.ID_CARD"></i>
            </div>

            <!-- Role Name -->
            <span class="role-card-name">{{ role.name }}</span>

            <!-- Selection Indicator -->
            <div class="selection-indicator">
              @if (isActive) {
                <div class="selected-circle">
                  <i class="pi pi-check"></i>
                </div>
              } @else {
                <div class="unselected-circle"></div>
              }
            </div>
          </button>
        }
      </div>
    </div>
  </p-popover>
}
