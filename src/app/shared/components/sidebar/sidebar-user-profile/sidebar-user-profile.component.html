<!-- User Profile Section - Bottom of Sidebar -->
<div class="user-section">
  <!-- Role Switcher (if multiple roles) -->
  @if (hasMultipleRoles()) {
    <app-role-switcher
      [roles]="userRoles()"
      [activeRole]="activeRole()"
      (roleChange)="onRoleChange($event)"
    />
  }

  <!-- Divider -->
  <div class="divider"></div>

  <!-- User Card -->
  <div class="user-card">
    <img
      [src]="userAvatar()"
      [alt]="user()?.fullName"
      class="user-avatar"
      loading="lazy"
    />
    <div class="user-info">
      <span class="user-name">{{ user()?.fullName }}</span>
      <span class="user-role">{{ getLoogedUserDesignation() }}</span>
    </div>
    <button
      type="button"
      class="user-menu-btn"
      (click)="toggleUserOptions($event)"
      (keydown.enter)="toggleUserOptions($event)"
      tabindex="0"
    >
      <i class="pi pi-ellipsis-v"></i>
    </button>
  </div>

  <!-- User Menu Popover -->
  <p-popover
    #userPopover
    [dismissable]="true"
    [appendTo]="'body'"
  >
    <div class="user-menu">
      @for (option of primaryOptions; track option.id) {
        <button
          type="button"
          class="menu-item"
          (click)="handleOptionClick(option)"
        >
          <i [ngClass]="option.icon"></i>
          <span>{{ option.label }}</span>
        </button>
      }

      <div class="menu-divider"></div>

      @for (option of secondaryOptions; track option.id) {
        @let isDanger = option.variant === 'danger';
        @let isTheme = option.id === 'theme';
        <button
          type="button"
          class="menu-item"
          [class.danger]="isDanger"
          (click)="handleOptionClick(option)"
        >
          <i [ngClass]="isTheme ? getThemeIcon() : option.icon"></i>
          <span>{{ isTheme ? getThemeLabel() : option.label }}</span>
        </button>
      }
    </div>
  </p-popover>
</div>
