<div class="py-6">
  <img
    [src]="userAvatar()"
    [alt]="user()?.fullName"
    class="w-16 h-16 rounded-full object-cover border-3 border-primary shadow-md mx-auto mb-3"
    (click)="toggleUserOptions()"
    [attr.aria-expanded]="showUserOptions()"
    role="button"
    tabindex="0"
    loading="lazy"
  />
  <h2 class="text-lg font-bold text-surface-900">{{ user()?.fullName }}</h2>
  <p class="text-sm font-medium text-surface-600">{{ user()?.designation }}</p>

  <!-- User Options Menu -->
  @if (showUserOptions()) {
    <div
      class="user-options"
      @fadeInOut
      role="menu"
    >
      <!-- Primary options group -->
      <div class="options-group">
        @for (option of primaryOptions; track option.id) {
          <a
            class="option-item"
            role="menuitem"
            tabindex="0"
            (click)="handleOptionClick(option)"
          >
            <i
              [class]="option.icon"
              aria-hidden="true"
            ></i>
            <span>{{ option.label }}</span>
          </a>
        }
      </div>

      <div
        class="options-divider"
        role="separator"
      ></div>

      <!-- Secondary options group -->
      <div class="options-group">
        @for (option of secondaryOptions; track option.id) {
          <a
            class="option-item"
            [class.theme-toggle]="option.variant === 'theme'"
            [class.logout]="option.variant === 'danger'"
            role="menuitem"
            tabindex="0"
            (click)="handleOptionClick(option)"
          >
            <i
              class="pi"
              [ngClass]="option.id === 'theme' ? getThemeIcon() : option.icon"
              aria-hidden="true"
            ></i>
            <span>{{ option.id === 'theme' ? getThemeLabel() : option.label }}</span>
          </a>
        }
      </div>
    </div>
  }
</div>
