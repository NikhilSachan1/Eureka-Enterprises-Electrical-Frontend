<header class="sidebar-header">
  <div
    class="logo-section"
    [class.clickable]="!isMobile()"
    (click)="onHeaderClick()"
    [attr.role]="!isMobile() ? 'button' : null"
    [attr.tabindex]="!isMobile() ? '0' : null"
  >
    <img
      src="https://i.postimg.cc/3w9krVGY/Untitled-design.png"
      alt="Eureka Logo"
      class="logo"
      loading="lazy"
    />
    <div class="brand">
      <h1>{{ companyName() }}</h1>
      <h2>{{ companyDescription() }}</h2>
    </div>
  </div>
  @if (!isMobile() && sidebarVisible()) {
    <i
      [class]="collapseIcon"
      class="collapse-icon"
      (click)="onHeaderClick()"
    ></i>
  }
</header>
