<div class="flex h-screen">
  <!-- Toggle Button -->
  <button
    type="button"
    class="p-button-rounded p-button-text p-button-primary toggle-button"
    [class.sidebar-visible]="sidebarVisible()"
    [attr.aria-expanded]="sidebarVisible()"
    [attr.aria-label]="sidebarVisible() ? 'Hide sidebar' : 'Show sidebar'"
    (click)="toggleSidebar()"
    @fadeInOut
  >
    <i class="pi" [class.pi-bars]="!sidebarVisible()" [class.pi-times]="sidebarVisible()"></i>
  </button>

  <!-- Sidebar -->
  <aside
    class="h-full transition-all duration-300 shadow-xl border-r border-surface-200"
    [ngClass]="sidebarVisible() ? 'w-80' : 'w-0'"
    [attr.aria-hidden]="!sidebarVisible()"
  >
    <!-- Header -->
    <header class="p-5">
      <div class="flex items-center gap-3">
        <img
          src="https://i.postimg.cc/3w9krVGY/Untitled-design.png"
          alt="Eureka Logo"
          class="w-12 h-12 rounded-lg shadow-sm"
          loading="lazy"
        />
        <div class="transition-all duration-300">
          <h1 class="text-xl font-bold text-primary tracking-tight whitespace-nowrap">
            Eureka PeopleOps
          </h1>
          <h2 class="text-sm font-medium text-surface-600 whitespace-nowrap">
            Eureka Enterprises
          </h2>
        </div>
      </div>
    </header>

    <!-- User Profile -->
    <div class="py-6">
      <img
        [src]="user.avatar"
        [alt]="user.name"
        class="w-16 h-16 rounded-full object-cover border-3 border-primary shadow-md mx-auto mb-3"
        (click)="toggleUserOptions()"
        [attr.aria-expanded]="showUserOptions()"
        role="button"
        tabindex="0"
        loading="lazy"
      />
      <h2 class="text-lg font-bold text-surface-900">{{ user.name }}</h2>
      <p class="text-sm font-medium text-surface-600">{{ user.designation }}</p>

      <!-- User Options Menu -->
      <div 
        class="user-options" 
        *ngIf="showUserOptions()" 
        @fadeInOut
        role="menu"
      >
        <div class="options-group">
          <a class="option-item" role="menuitem" tabindex="0" (click)="navigateTo('/profile')">
            <i class="pi pi-user" aria-hidden="true"></i>
            <span>My Profile</span>
          </a>
          <a class="option-item" role="menuitem" tabindex="0" (click)="navigateTo('/settings')">
            <i class="pi pi-cog" aria-hidden="true"></i>
            <span>Settings</span>
          </a>
          <a class="option-item" role="menuitem" tabindex="0" (click)="navigateTo('/reset-password')">
            <i class="pi pi-lock" aria-hidden="true"></i>
            <span>Reset Password</span>
          </a>
        </div>
        
        <div class="options-divider" role="separator"></div>
        
        <div class="options-group">
          <a class="option-item theme-toggle" role="menuitem" tabindex="0" (click)="toggleTheme()">
            <i class="pi" [ngClass]="themeService.isDarkMode() ? 'pi-sun' : 'pi-moon'" aria-hidden="true"></i>
            <span>{{ themeService.isDarkMode() ? 'Light Mode' : 'Dark Mode' }}</span>
          </a>
          <a class="option-item logout" role="menuitem" tabindex="0" (click)="logout()">
            <i class="pi pi-power-off" aria-hidden="true"></i>
            <span>Logout</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Menu Container -->
    <nav class="menu-scroll-container">
      <div class="menu-wrapper">
        <!-- Loop through menu sections -->
        <ng-container *ngFor="let section of menuService.getMenuSections()">
          <h3 class="text-xs uppercase font-extrabold text-primary mb-3 tracking-wider px-3">
            {{ section.label }}
          </h3>

          <div class="menu-container">
            <ng-container *ngFor="let item of section.items">
              <!-- Route Menu Item -->
              <div *ngIf="item.type === 'route'" class="menu-item">
                <div
                  class="flex items-center rounded-lg cursor-pointer"
                  [class.active-menu-item]="isMenuItemActive(item)"
                  [routerLink]="item.routerLink"
                  [routerLinkActive]="'active-route'"
                  role="link"
                  tabindex="0"
                  (click)="closeAllSubmenus()"
                >
                  <i *ngIf="item.icon" [class]="item.icon" class="text-xl" aria-hidden="true"></i>
                  <span class="flex-1">{{ item.label }}</span>
                </div>
              </div>

              <!-- Parent Menu Item with Submenu -->
              <div *ngIf="item.type === 'parent'" class="menu-item">
                <div
                  class="flex items-center rounded-lg cursor-pointer"
                  [class.active-menu-item]="isMenuItemActive(item)"
                  (click)="toggleSubmenu(item)"
                  role="button"
                  [attr.aria-expanded]="isMenuItemExpanded(item)"
                  tabindex="0"
                >
                  <i *ngIf="item.icon" [class]="item.icon" class="text-xl" aria-hidden="true"></i>
                  <span class="flex-1">{{ item.label }}</span>
                  <i
                    class="pi pi-chevron-down text-sm transition-transform"
                    [class.rotate-180]="isMenuItemExpanded(item)"
                    aria-hidden="true"
                  ></i>
                </div>

                <div
                  class="submenu"
                  [class.submenu-expanded]="isMenuItemExpanded(item)"
                  @slideInOut
                  role="menu"
                  [attr.aria-hidden]="!isMenuItemExpanded(item)"
                >
                  <!-- Loop through child items - Recursive rendering -->
                  <ng-container *ngFor="let child of item.children">
                    <!-- Child Route Items -->
                    <a
                      *ngIf="child.type === 'route'"
                      class="submenu-item"
                      [routerLink]="child.routerLink"
                      routerLinkActive="active"
                      [attr.aria-current]="isMenuItemActive(child) ? 'page' : null"
                      role="menuitem"
                      tabindex="0"
                      (click)="closeAllSubmenus()"
                    >
                      <i *ngIf="child.icon" [class]="child.icon" aria-hidden="true"></i>
                      <span>{{ child.label }}</span>
                    </a>
                    
                    <!-- Nested parent items (for multi-level menus) -->
                    <div *ngIf="child.type === 'parent'">
                      <div 
                        (click)="toggleSubmenu(child)"
                        [attr.aria-expanded]="isMenuItemExpanded(child)"
                        role="button"
                        tabindex="0"
                      >
                        <i *ngIf="child.icon" [class]="child.icon" aria-hidden="true"></i>
                        <span>{{ child.label }}</span>
                        <i class="pi pi-chevron-right" [class.rotate-90]="isMenuItemExpanded(child)"></i>
                      </div>
                      
                      <!-- This would be another level of submenu if needed -->
                    </div>
                  </ng-container>
                </div>
              </div>
            </ng-container>
          </div>
        </ng-container>
      </div>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main
    class="flex-1 transition-all duration-300 p-4"
    [ngClass]="{ 'ml-80': sidebarVisible(), 'ml-0': !sidebarVisible() }"
  >
    <ng-content></ng-content>
  </main>

  <!-- Mobile backdrop -->
  <div 
    *ngIf="isMobile() && sidebarVisible()"
    class="mobile-backdrop"
    (click)="toggleSidebar()"
    role="presentation"
    aria-hidden="true"
  ></div>
</div>
