<div class="flex h-screen">
  <!-- Toggle Button -->
  <button
    pButton
    [class]="'pi ' + (sidebarVisible() ? 'pi-angle-left' : 'pi-angle-right')"
    class="p-button-rounded p-button-text p-button-primary toggle-button"
    [ngClass]="{ 'sidebar-visible': sidebarVisible() }"
    (click)="toggleSidebar()"
  ></button>

  <!-- Sidebar -->
  <div
    class="h-full bg-white shadow-xl transition-all duration-300 border-r border-surface-200"
    [ngClass]="sidebarVisible() ? 'w-80' : 'w-0'"
  >
    <!-- Fixed Header -->
    <div class="p-5">
      <div class="flex items-center gap-3">
        <img
          src="https://i.postimg.cc/3w9krVGY/Untitled-design.png"
          alt="Eureka Logo"
          class="w-12 h-12 rounded-lg shadow-sm"
        />
        <div class="transition-all duration-300">
          <h1 class="text-xl font-bold text-primary tracking-tight whitespace-nowrap">
            Eureka PeopleOps
          </h1>
          <h2 class="text-sm font-medium text-surface-600 whitespace-nowrap">
            Eureka Enterprises
          </h2>
        </div>
      </div>
    </div>

    <!-- Menu Container -->
    <div class="menu-scroll-container">
      <div class="menu-wrapper">
        <h3 class="text-xs uppercase font-extrabold text-primary mb-3 tracking-wider px-3">
          {{ items[0].label }}
        </h3>

        <div class="menu-container">
          <div
            *ngFor="let category of items[0].items"
            class="menu-item"
            [class.active]="category.routerLink === router.url"
          >
            <div
              class="flex items-center rounded-lg cursor-pointer"
              [class.active-menu-item]="category.routerLink === router.url"
              (click)="toggleSubmenu(category)"
              [routerLink]="!category.items ? category.routerLink : null"
            >
              <i [class]="category.icon" class="text-xl"></i>
              <span class="flex-1">{{ category.label }}</span>
              <i
                *ngIf="category.items"
                class="pi pi-chevron-down text-sm transition-transform"
                [class.rotate-180]="category.expanded"
              ></i>
            </div>

            <div
              *ngIf="category.items"
              class="submenu"
              [class.submenu-expanded]="category.expanded"
            >
              <div
                *ngFor="let subItem of category.items"
                class="submenu-item"
                [routerLink]="subItem.routerLink"
                routerLinkActive="active"
              >
                <i [class]="subItem.icon"></i>
                <span>{{ subItem.label }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- User Options Menu -->
    <div class="user-options">
      <!-- Trigger Button -->
      <div class="options-trigger" (click)="toggleOptionsMenu()">
        <img [src]="user.avatar" [alt]="user.name">
        <div class="user-info">
          <h3>{{ user.name }}</h3>
          <p>{{ user.designation }}</p>
        </div>
        <i class="pi pi-chevron-up" [class.rotate-180]="showOptionsMenu"></i>
      </div>

      <!-- Options Menu -->
      <div class="options-menu" *ngIf="showOptionsMenu">
        <div class="option-item" routerLink="/settings">
          <i class="pi pi-cog"></i>
          <span>Settings</span>
        </div>
        <div class="option-item" routerLink="/profile">
          <i class="pi pi-user"></i>
          <span>My Profile</span>
        </div>
        <div class="option-item" routerLink="/my-id">
          <i class="pi pi-id-card"></i>
          <span>My ID</span>
        </div>
        <div class="theme-toggle" (click)="toggleTheme()">
          <span>Theme</span>
          <div class="theme-icons">
            <i class="pi pi-sun" [class.active]="!isDarkTheme()"></i>
            <i class="pi pi-moon" [class.active]="isDarkTheme()"></i>
          </div>
        </div>
        <div class="option-item danger" (click)="logout()">
          <i class="pi pi-power-off"></i>
          <span>Logout</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content Area -->
  <div
    class="flex-1 transition-all duration-300 p-4 bg-white"
    [ngClass]="{ 'ml-80': sidebarVisible(), 'ml-0': !sidebarVisible() }"
  >
    <ng-content></ng-content>
  </div>

  <!-- Mobile backdrop -->
  <div 
    *ngIf="isMobile && sidebarVisible()"
    class="mobile-backdrop"
    (click)="toggleSidebar()"
  ></div>
</div>
