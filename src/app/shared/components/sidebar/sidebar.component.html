<div
  class="sidebar-layout"
  [ngClass]="{ 'dark-theme-active': themeService.isDarkMode() }"
>
  <!-- Toggle Button - Only on Mobile -->
  @if (isMobile()) {
    <button
      type="button"
      class="sidebar-toggle"
      [class.sidebar-toggle--visible]="sidebarVisible()"
      [class.transition-enabled]="transitionEnabled()"
      [attr.aria-expanded]="sidebarVisible()"
      [attr.aria-label]="sidebarVisible() ? 'Hide sidebar' : 'Show sidebar'"
      (click)="toggleSidebar()"
      @fadeInOut
    >
      <i
        class="pi"
        [ngClass]="sidebarVisible() ? 'pi-times' : 'pi-bars'"
      ></i>
    </button>
  }

  <!-- Sidebar: hover on collapsed desktop expands as overlay -->
  <aside
    class="sidebar"
    [ngClass]="{
      'sidebar--expanded': sidebarVisible() || hoverExpanded(),
      'sidebar--collapsed': !sidebarVisible() && !hoverExpanded(),
      'sidebar--overlay': hoverExpanded(),
    }"
    [attr.aria-hidden]="!sidebarVisible() && !hoverExpanded()"
    (mousedown)="onSidebarMouseDown()"
    (mouseenter)="onSidebarMouseEnter()"
    (mouseleave)="onSidebarMouseLeave()"
  >
    <app-sidebar-header
      [sidebarVisible]="sidebarVisible()"
      [isMobile]="isMobile()"
      (toggleSidebar)="toggleSidebar()"
    />
    <!-- User Profile - Top (Centered) -->
    <app-sidebar-user-profile />
    <div class="sidebar-content">
      <app-sidebar-menu [isCollapsed]="!sidebarVisible() && !hoverExpanded()" />
    </div>
    <!-- Role Switcher - Above Compact Profile -->
    <app-role-switcher [isSidebarCollapsed]="!sidebarVisible() && !hoverExpanded()" />
    <!-- User Profile - Bottom (Compact) -->
    <app-sidebar-user-profile
      [compact]="true"
      [isSidebarCollapsed]="!sidebarVisible() && !hoverExpanded()"
    />
  </aside>

  <!-- Blur backdrop when sidebar is hover-expanded (desktop) -->
  @if (hoverExpanded() && !isMobile()) {
    <div
      class="sidebar-blur-backdrop"
      aria-hidden="true"
    ></div>
  }

  <!-- Main Content Area -->
  <app-content-area
    [sidebarVisible]="sidebarVisible()"
    [isMobile]="isMobile()"
    [sidebarCollapsed]="!sidebarVisible()"
  >
    <ng-content />
  </app-content-area>

  <!-- Mobile backdrop -->
  @if (isMobile() && sidebarVisible()) {
    <div
      class="sidebar-backdrop"
      (click)="toggleSidebar()"
      aria-hidden="true"
    ></div>
  }
</div>
