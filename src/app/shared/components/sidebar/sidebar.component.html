<div class="flex h-screen">
  <!-- Toggle Button -->
  <button type="button" class="p-button-rounded p-button-text p-button-primary toggle-button"
    [class.sidebar-visible]="sidebarVisible()" [attr.aria-expanded]="sidebarVisible()"
    [attr.aria-label]="sidebarVisible() ? 'Hide sidebar' : 'Show sidebar'" (click)="toggleSidebar()" @fadeInOut>
    <i class="pi" [class.pi-bars]="!sidebarVisible()" [class.pi-times]="sidebarVisible()"></i>
  </button>

  <!-- Sidebar -->
  <aside class="h-full transition-all duration-300 shadow-xl border-r border-surface-200"
    [ngClass]="sidebarVisible() ? 'w-80' : 'w-0'" [attr.aria-hidden]="!sidebarVisible()">
    <app-sidebar-header></app-sidebar-header>
    <app-sidebar-user-profile></app-sidebar-user-profile>
    <app-sidebar-menu></app-sidebar-menu>
  </aside>

  <!-- Main Content Area -->
  <app-content-area [sidebarVisible]="sidebarVisible()" [isMobile]="isMobile()">
    <ng-content></ng-content>
  </app-content-area>

  <!-- Mobile backdrop -->
  <div *ngIf="isMobile() && sidebarVisible()" class="mobile-backdrop" (click)="toggleSidebar()" role="presentation"
    aria-hidden="true"></div>
</div>
