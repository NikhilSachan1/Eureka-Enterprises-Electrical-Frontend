<div class="stats-card bg-white rounded-lg shadow-sm p-4 border-l-4">
  <div class="flex justify-between">
    <div>
      <h3 class="text-gray-500 text-sm font-medium">{{ title }}</h3>
      <p class="text-2xl font-bold text-gray-800">{{ value }}</p>
    </div>
    <div class="flex items-center justify-center w-12 h-12 rounded-full icon-container">
      <i [ngClass]="'pi pi-' + icon + ' text-xl'"></i>
    </div>
  </div>
  <p class="text-xs text-gray-500 mt-2">{{ subtitle }}</p>
</div>
