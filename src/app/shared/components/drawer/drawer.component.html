<p-drawer
  [(visible)]="visible"
  [position]="currentConfig().position"
  [fullScreen]="currentConfig().fullScreen"
  [closable]="currentConfig().closable"
  [dismissible]="currentConfig().dismissible"
  [closeOnEscape]="currentConfig().closeOnEscape"
  [modal]="currentConfig().modal"
  [showCloseIcon]="currentConfig().showCloseIcon"
  (visibleChange)="onDrawerVisibleChange()"
  (onShow)="onDrawerShow()"
  (onHide)="onDrawerHide()"
>
  <ng-template #header>
    <div>
      <h1 class="text-2xl font-bold text-gray-800">{{ pageHeaderConfig().title }}</h1>
      <p class="text-gray-600 text-sm">{{ pageHeaderConfig().subtitle }}</p>
    </div>
  </ng-template>
  <ng-template pTemplate="content">
    <ng-container *ngComponentOutlet="currentConfig().component; injector: _componentInjector()"></ng-container>
  </ng-template>
</p-drawer>
