<!-- Route Progress Bar - Shows loading indicator at top -->
<app-route-progress-bar />

<main
  class="content-area"
  [ngClass]="{
    'content-area--with-sidebar': sidebarVisible() && !isMobile() && !sidebarCollapsed(),
    'content-area--sidebar-collapsed': sidebarCollapsed() && !isMobile(),
    'content-area--dark': themeService.isDarkMode(),
    'transition-enabled': transitionEnabled(),
  }"
>
  <!-- Page content - re-renders after loading to trigger animation -->
  @if (!routeLoading.isLoading()) {
    <div
      class="p-4 page-content"
      @pageTransition
    >
      <ng-content />
    </div>
  }

  <!-- Dark overlay mask + Center spinner -->
  @if (routeLoading.isLoading()) {
    <div class="loading-overlay">
      <div class="center-spinner">
        <p-progressspinner
          strokeWidth="4"
          animationDuration="0.8s"
          [style]="{ width: '50px', height: '50px' }"
        />
      </div>
    </div>
  }
</main>
