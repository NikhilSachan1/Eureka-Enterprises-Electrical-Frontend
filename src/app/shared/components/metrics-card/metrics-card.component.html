@let metrics = metricCardConfig();

<div class="flex flex-wrap gap-4">
  @for (metric of metrics; track metric.label) {
    <div
      [ngClass]="[
        'flex-1',
        'p-3',
        'min-w-[100px]',
        'sm:min-w-[160px]',
        'text-center',
        'rounded-lg',
        'border-l-4',
        'transition-all',
        'duration-300',
        'hover:shadow-md',
        'hover:scale-105',
        'cursor-pointer',
        'flex flex-col justify-center',
        `bg-${getColor(metric.label)}-50`,
        `border-l-${getColor(metric.label)}-500`,
      ]"
    >
      <div [ngClass]="['text-xl lg:text-3xl', 'font-bold', 'mb-2', `text-${getColor(metric.label)}-600`]">
        {{ metric.value }}
      </div>
      <div
        class="text-sm font-medium text-gray-700"
        [title]="metric.label"
      >
        {{ metric.label }}
      </div>
    </div>
  }
</div>
