<div class="bg-white rounded-lg shadow-sm border border-slate-100 p-5 h-full flex flex-col transform transition-all duration-300 ease-in-out hover:shadow-lg hover:-translate-y-1 hover:border-blue-100 cursor-pointer">
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-3">
      <div [class]="'w-8 h-8 rounded-md flex items-center justify-center transition-colors duration-300 hover:bg-opacity-80 ' + iconBgClass()">
        <i [class]="iconClass() + ' transition-transform duration-300 group-hover:scale-110'"></i>
      </div>
      <div>
        <h3 class="text-sm font-semibold text-slate-700 group-hover:text-slate-900">{{ title() }}</h3>
        <p class="text-xs text-slate-400 group-hover:text-slate-600">{{ subtitle() }}</p>
      </div>
    </div>
  </div>

  <!-- Metrics -->
  <div class="flex flex-row border-t border-slate-100 pt-5 mt-0.5 group">
    @for (metric of metrics(); track metric.label; let last = $last) {
      <div class="flex-1 px-3 text-center relative group/item hover:bg-slate-50 rounded-md py-2 transition-colors duration-300">
        <!-- Divider (except for last item) -->
        @if (!last) {
          <div class="absolute -right-0.5 w-px h-3/5 top-1/5 bg-slate-100 group-hover/item:bg-transparent"></div>
        }
        
        <div class="text-lg font-semibold text-slate-800 transition-all duration-300 group-hover/item:text-blue-600 metric-value-animate">{{ metric.value }}</div>
        <div class="text-xs text-slate-500 transition-all duration-300 group-hover/item:text-slate-700">{{ metric.label }}</div>
      </div>
    }
  </div>
</div>
