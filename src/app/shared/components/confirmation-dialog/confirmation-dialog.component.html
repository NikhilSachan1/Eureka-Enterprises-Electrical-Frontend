<p-confirmdialog
  #cd
  [style]="{ margin: '1rem' }"
>
  <ng-template
    #headless
    let-message
  >
    @let settings = currentDialogConfig().dialogConfig;
    <!-- Compact outer container: scrolls as a whole and uses tighter padding so dialog looks lighter. -->
    <div class="flex flex-col items-center px-6 pt-20 pb-6 rounded-lg max-h-[90vh] overflow-y-auto">
      <!-- Icon Section -->
      <div
        [class]="
          `rounded-full inline-flex shrink-0 justify-center items-center h-20 w-20 -mt-16 shadow-lg ${settings?.iconContainerClass || 'confirmation-dialog-icon-container'}`
        "
      >
        <i [class]="settings?.icon + ' !text-4xl'"></i>
      </div>

      <!-- Header Section -->
      <div class="text-center mt-4">
        <span class="font-bold text-xl block mb-1">{{ settings?.header }}</span>
        <p class="text-sm mb-4">{{ settings?.message }}</p>
      </div>

      <!-- Content Section -->
      <div class="w-full mt-3">
        <!-- Record Details Section -->
        @if (currentDialogConfig().recordDetails) {
          <div class="w-full mb-3">
            <app-view-detail [drawerDetails]="currentDialogConfig().recordDetails" />
          </div>
        }

        <!-- Dynamic Component Container -->
        @if (currentDialogConfig().dynamicComponent) {
          <div class="w-full mt-4">
            <ng-container #dynamicComponentContainer></ng-container>
          </div>
        }
      </div>

      <!-- Buttons Section -->
      <div class="flex items-center justify-center gap-4 mt-4">
        @if (isAcceptButtonVisible()) {
          <app-button
            [buttonConfig]="acceptButtonConfig()"
            (onButtonClick)="handleDialog(true)"
          />
        }
        @if (isRejectButtonVisible()) {
          <app-button
            [buttonConfig]="rejectButtonConfig()"
            (onButtonClick)="handleDialog(false)"
          />
        }
      </div>
    </div>
  </ng-template>
</p-confirmdialog>
