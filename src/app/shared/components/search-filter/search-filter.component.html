@if (form.formGroup && form.fieldConfigs && form.buttonConfigs) {
  <div class="search-filter-container">
    <p-panel
      [toggleable]="true"
      [collapsed]="false"
      class="search-filter-panel"
    >
      <!-- Custom Header -->
      <ng-template pTemplate="header">
        <div class="flex items-center gap-3">
          <div class="search-filter-header-icon">
            <i [class]="ICONS.COMMON.FILTER + ' text-white text-sm'"></i>
          </div>
          <div class="flex-1">
            <h3 class="font-bold text-lg leading-tight">Search & Filter</h3>
            <p class="text-xs mt-0.5">Find exactly what you need</p>
          </div>
        </div>
      </ng-template>

      <!-- Panel Content -->
      <form
        (ngSubmit)="onSubmit()"
        [formGroup]="form.formGroup"
      >
        <!-- Filter Fields -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          @for (field of form.fieldConfigs | keyvalue: customSort; track field.key) {
            <div class="filter-field-wrapper">
              <app-input-field
                [formGroup]="form.formGroup"
                [inputFieldConfig]="field.value"
              />
            </div>
          }
        </div>

        <!-- Action Bar -->
        <div class="flex items-center justify-end gap-3 mt-6 pt-5 border-t">
          <app-button
            [buttonConfig]="form.buttonConfigs['reset']"
            [showDisabledButton]="!form.formGroup.dirty && !hasSearched && !hasPrefillValues"
            (onButtonClick)="onReset()"
          />
          <app-button
            [buttonConfig]="form.buttonConfigs['submit']"
            [showDisabledButton]="!form.formGroup.dirty && !hasPrefillValues"
          />
        </div>
      </form>
    </p-panel>
  </div>
}
