@if (form.formGroup && form.fieldConfigs && form.buttonConfigs) {
  <div class="search-filter-container">
    <p-panel
      [toggleable]="true"
      [collapsed]="false"
      class="search-filter-panel"
    >
      <!-- Custom Header -->
      <ng-template pTemplate="header">
        <div class="flex items-center gap-2.5">
          <div class="search-filter-header-icon">
            <i [class]="ICONS.COMMON.FILTER + ' text-white text-xs'"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-base leading-tight">Search & Filter</h3>
            <p class="text-xs mt-0.5 text-text-secondary">Find exactly what you need</p>
          </div>
        </div>
      </ng-template>

      <!-- Panel Content -->
      <form
        (ngSubmit)="onSubmit()"
        [formGroup]="form.formGroup"
      >
        <div class="search-filter-grid">
          @for (field of form.fieldConfigs | keyvalue: customSort; track field.key) {
            @if (isFieldVisible(field.key)) {
              <div class="filter-field-wrapper">
                <app-input-field
                  [formGroup]="form.formGroup"
                  [inputFieldConfig]="field.value"
                />
              </div>
            }
          }
        </div>

        <div class="search-filter-actions">
          <app-button
            [buttonConfig]="form.buttonConfigs['reset']"
            [showDisabledButton]="isResetDisabled()"
            (onButtonClick)="onReset()"
          />
          <app-button
            [buttonConfig]="form.buttonConfigs['submit']"
            [showDisabledButton]="isSearchDisabled()"
          />
        </div>
      </form>
    </p-panel>
  </div>
}
