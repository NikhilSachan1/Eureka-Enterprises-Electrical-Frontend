<router-outlet />

<!-- General Loading Overlay -->
<app-loading-overlay
  [show]="loadingService.isLoading()"
  [title]="loadingService.title()"
  [message]="loadingService.message()"
/>

<!-- Global Toast Notifications -->
<p-toast />

<!-- Global Confirmation Dialog -->
<app-confirmation-dialog />

<!-- Global Drawer -->
<app-drawer />

<!-- Global Gallery -->
<app-gallery [media]="galleryService.media()" />

@if (networkMonitor.showOfflineOverlay()) {
  <app-offline />
}

<!-- Dev: Centralized Log Viewer (floating button bottom-right) -->
<app-log-viewer />
