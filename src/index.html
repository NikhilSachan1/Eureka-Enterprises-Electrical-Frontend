<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>EurekaEnterprisesElectricalFrontend</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="favicon.ico"
    />
  </head>
  <body>
    <app-root></app-root>
    <div class="bootstrap-app-loader">
      <div class="loader-container">
        <div class="brand-section">
          <div class="logo-wrapper">
            <div class="logo-circle">
              <div class="logo-inner">
                <div class="logo-core"></div>
              </div>
            </div>
          </div>
          <div class="brand-text">
            <h1 class="app-title">Eureka Enterprises</h1>
            <p class="app-subtitle">Electrical Management System</p>
          </div>
        </div>

        <div class="loading-section">
          <div class="spinner-container">
            <div class="spinner">
              <div class="spinner-ring ring-primary"></div>
              <div class="spinner-ring ring-secondary"></div>
              <div class="spinner-ring ring-tertiary"></div>
            </div>
          </div>

          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill"></div>
            </div>
            <div class="progress-text">Initializing Application</div>
          </div>
        </div>

        <div class="loading-text">
          <span class="loading-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </span>
        </div>
      </div>
    </div>
  </body>
</html>
