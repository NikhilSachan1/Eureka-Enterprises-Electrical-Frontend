name: Build & Deploy

on:
workflow_dispatch:
inputs:
environment:
description: Environment
required: true
type: choice
options:
- prod
- uat

```
  service:
    description: Service
    required: true
    type: choice
    options:
      - frontend
      - backend
      - fullstack
```

jobs:

build-frontend:
if: github.event.inputs.service == 'frontend' || github.event.inputs.service == 'fullstack'
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Frontend Repo
    uses: actions/checkout@v4
    with:
      repository: NikhilSachan1/Eureka-Enterprises-Electrical-Frontend
      ref: ${{ github.event.inputs.environment == 'prod' && 'master' || 'uat' }}
      token: ${{ secrets.GH_PAT }}

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ap-south-1

  - name: Login ECR
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build Frontend Image
    run: |
      docker build -t frontend-image .

  - name: Push Frontend Image
    run: |
      if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
        REPO=eureka-electrical-frontend-prod
      else
        REPO=eureka-electrical-frontend-uat
      fi

      docker tag frontend-image:latest \
      299210040442.dkr.ecr.ap-south-1.amazonaws.com/$REPO:latest

      docker push \
      299210040442.dkr.ecr.ap-south-1.amazonaws.com/$REPO:latest
```

build-backend:
if: github.event.inputs.service == 'backend' || github.event.inputs.service == 'fullstack'
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Backend Repo
    uses: actions/checkout@v4
    with:
      repository: NikhilSachan1/Eureka-Enterprises-Electrical-Backend
      ref: ${{ github.event.inputs.environment == 'prod' && 'main' || 'uat' }}
      token: ${{ secrets.GH_PAT }}

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ap-south-1

  - name: Login ECR
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build Backend Image
    run: |
      docker build -t backend-image .

  - name: Push Backend Image
    run: |
      if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
        REPO=eureka-electrical-backend-prod
      else
        REPO=eureka-electrical-backend-uat
      fi

      docker tag backend-image:latest \
      299210040442.dkr.ecr.ap-south-1.amazonaws.com/$REPO:latest

      docker push \
      299210040442.dkr.ecr.ap-south-1.amazonaws.com/$REPO:latest
```

deploy:
needs:
- build-frontend
- build-backend

```
if: always() && !contains(needs.*.result, 'failure')

runs-on: ubuntu-latest

steps:
  - name: Checkout Deployment Repo
    uses: actions/checkout@v4

  - name: Deploy
    uses: appleboy/ssh-action@v1.2.0
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      script: |
        aws ecr get-login-password --region ap-south-1 \
        | docker login \
          --username AWS \
          --password-stdin 299210040442.dkr.ecr.ap-south-1.amazonaws.com

        if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
          cd /opt/eureka-prod
          docker compose -f docker-compose-prod.yml pull
          docker compose -f docker-compose-prod.yml up -d --remove-orphans
        else
          cd /opt/eureka-uat
          docker compose -f docker-compose-uat.yml pull
          docker compose -f docker-compose-uat.yml up -d --remove-orphans
        fi
```
