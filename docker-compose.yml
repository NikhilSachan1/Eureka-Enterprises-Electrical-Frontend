version: "3"  # Use the latest stable version
services:
  angular-app:
    build: .
    ports:
      - "4200:4200"  # Exposes Angular app on port 4200
    volumes:
      - .:/app  # Mounts the project directory inside the container
      - /app/node_modules  # Prevents overwriting `node_modules` inside the container
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true  # Ensures file changes are detected in Docker
      - WATCHPACK_POLLING=true  # Helps Webpack detect changes inside the container
    working_dir: /app  # Set working directory
    command: ["ng", "serve", "--host", "0.0.0.0", "--port", "4200", "--disable-host-check"]
